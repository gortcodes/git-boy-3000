name: Docker

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  build:
    uses: gortcodes/ci-templates/.github/workflows/docker-build.yml@main

  health:
    needs: build
    uses: gortcodes/ci-templates/.github/workflows/docker-health.yml@main
    with:
      port: "8000"
      path: "/healthz"
      timeout-seconds: 60
      run-args: "-e LETHARGY_DB_URL=postgresql+asyncpg://ci:ci@localhost:5432/ci -e LETHARGY_REDIS_URL=redis://localhost:6379/0"

  push:
    needs: health
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    uses: gortcodes/ci-templates/.github/workflows/docker-push.yml@main
    permissions:
      contents: read
      packages: write
